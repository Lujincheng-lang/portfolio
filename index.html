            <h2 class="section-标题">关于我</h2>
            <div class="about-内容">
                <div class="about-text">
                    <h3>路锦程</h3>
                    <p class="about-role">环境设计师 / 空间设计研究者</p>

                    <div class="skills">
                        <span class="skill-tag">空间设计</span>

                <div class="about-stats">
                    <div class="stat-item"><span class="stat-number">4</span><span class="stat-label">作品分类</span></div>

            </div>
